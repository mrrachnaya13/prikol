<!doctype html>
<html lang="ru">
  <head>

    <title>Hello Kitty Store</title>
    <link rel="stylesheet" href="styles.css" />

    <main class="page">
      <section class="hero card">
        <div class="hero__brand">
          <img
            class="kitty-face"

        <nav class="products" aria-label="Товары Hello Kitty">

          <a class="product" href="product-cup.html">

          <a class="product" href="product-hoodie.html">

          </a>
          <a class="product" href="product-case.html">
            <img src="https://i.imgur.com/O46Ytyv.jpeg" alt="Чехол Hello Kitty" />
