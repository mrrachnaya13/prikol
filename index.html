<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Магазин фигни</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero card">
        <div class="hero__brand">
          <div class="kitty">🐱</div>
          <div>
            <h1>Магазин фигни</h1>
            <p>лучший магазин<br />всякой лабуды в городе</p>
          </div>
        </div>
        <div class="hero__image" aria-hidden="true"></div>
      </section>

      <section class="catalog card">
        <h2>Покупайте у нас</h2>
        <div class="products">
          <article class="product">Блеск</article>
          <article class="product">Ноутбук</article>
          <article class="product">Кружка</article>
          <article class="product">Худи</article>
          <article class="product">Чехол</article>
        </div>
      </section>

      <div class="corner-kitty" aria-hidden="true">🐱</div>
    </main>
  </body>
</html>
