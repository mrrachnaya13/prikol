<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Kitty Store</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero card">
        <div class="hero__brand">
          <div class="kitty-face" aria-hidden="true">🐱</div>
          <div>
            <h1>Hello Kitty Store</h1>
            <p>Милый магазин с самой красивой Hello Kitty лабудой</p>
          </div>
        </div>
        <div class="hero__banner" aria-hidden="true"></div>
      </section>

      <section class="catalog card">
        <h2>Покупайте у нас</h2>
        <p class="catalog__subtitle">Топ-товары Hello Kitty с быстрой доставкой по городу</p>

        <nav class="products" aria-label="Товары Hello Kitty">
          <a class="product product--gel" href="product-gel.html">
            <span class="product__name">Гель</span>
            <span class="product__price">500 ₽</span>
          </a>
          <a class="product product--computer" href="product-computer.html">
            <span class="product__name">Компьютер</span>
            <span class="product__price">40 000 ₽</span>
          </a>
          <a class="product product--cup" href="product-cup.html">
            <span class="product__name">Кружка</span>
            <span class="product__price">1 200 ₽</span>
          </a>
          <a class="product product--hoodie" href="product-hoodie.html">
            <span class="product__name">Худи</span>
            <span class="product__price">3 500 ₽</span>
          </a>
          <a class="product product--case" href="product-case.html">
            <span class="product__name">Чехол</span>
            <span class="product__price">2 000 ₽</span>
          </a>
        </nav>
      </section>
    </main>
  </body>
</html>
